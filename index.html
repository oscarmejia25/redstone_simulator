<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redstone Sandbox</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="ui">
        <div id="crosshair">+</div>
        
        <!-- Menú PC -->
        <div id="instructions">
            <h1>Redstone Sandbox</h1>
            <p>Haz clic para jugar<br>WASD: Mover | Space/Shift: Subir/Bajar<br>ESC para pausar</p>
        </div>

        <!-- Menú Móvil -->
        <div id="mobile-pause-menu">
            <h1>PAUSA</h1>
            <button id="btn-resume-mobile">REANUDAR</button>
        </div>

        <div id="hotbar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>

        <!-- Controles Móvil -->
        <div id="mobile-controls">
            <div id="move-pad">
                <button id="btn-w" class="ctrl-btn">W</button>
                <button id="btn-a" class="ctrl-btn">A</button>
                <button id="btn-s" class="ctrl-btn">S</button>
                <button id="btn-d" class="ctrl-btn">D</button>
            </div>
            <div id="right-mobile-pad">
                <button id="btn-pause" class="ctrl-btn">❚❚</button>
                <button id="btn-space" class="ctrl-btn">▲</button>
                <button id="btn-shift" class="ctrl-btn">▼</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
