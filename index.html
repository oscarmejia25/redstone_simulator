<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redstone Sandbox</title>
    
    <!-- Fuente Pixelada estilo Minecraft -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="ui">
        <div id="crosshair">+</div>
        
        <!-- Menú Principal Estilo Minecraft -->
        <div id="instructions">
            <h1 class="mc-title">Redstone Sandbox</h1>
            <p class="mc-subtitle">Haz clic para jugar</p>
            <p class="mc-text">WASD: Mover | Space/Shift: Subir/Bajar<br>ESC para pausar</p>
        </div>

        <!-- Menú de Pausa -->
        <div id="mobile-pause-menu">
            <h1 class="mc-title">Juego en Pausa</h1>
            <button id="btn-resume-mobile" class="mc-button">Volver al Juego</button>
        </div>

        <!-- Barra de Objetos (Hotbar) -->
        <div id="hotbar">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>

        <!-- Controles Móvil (Estilo Bedrock) -->
        <div id="mobile-controls">
            <div id="move-pad">
                <button id="btn-w" class="ctrl-btn">▲</button>
                <button id="btn-a" class="ctrl-btn">◄</button>
                <button id="btn-s" class="ctrl-btn">▼</button>
                <button id="btn-d" class="ctrl-btn">►</button>
            </div>
            <div id="right-mobile-pad">
                <button id="btn-pause" class="ctrl-btn">⏸</button>
                <button id="btn-space" class="ctrl-btn">⬆</button>
                <button id="btn-shift" class="ctrl-btn">⬇</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
